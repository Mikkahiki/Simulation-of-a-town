<!DOCTYPE html>
<html>
<head>
<title>Climate Game</title>

<style>
body{
font-family:Arial;
background:#0a1726;
color:white;
text-align:center;
}

.card{
background:#102a43;
padding:20px;
margin:20px auto;
width:60%;
border-radius:10px;
}

button{
padding:12px;
margin:10px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:6px;
background:#2fa4ff;
color:white;
}
</style>

</head>

<body>

<h1>🌍 Climate Simulation</h1>

<div class="card">

<h2>Day {{ state.day }}</h2>

<p>Temperature: {{ state.temperature }}</p>
<p>CO₂: {{ state.co2_tons }}</p>
<p>Economy: {{ state.economy }}</p>
<p>Public: {{ state.public }}</p>

</div>

<div class="card">

<h2>{{ scenario.title }}</h2>
<p>{{ scenario.text }}</p>

<a href="/decision/1"><button>{{ scenario.good.text }}</button></a>
<a href="/decision/2"><button>{{ scenario.neutral.text }}</button></a>
<a href="/decision/3"><button>{{ scenario.bad.text }}</button></a>

</div>

</body>
</html>
