<!DOCTYPE html>
<html>
<head>
    <title>Climate Game</title>
    <style>
        body {
            background: #0b132b;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .card {
            background: #1c2541;
            padding: 20px;
            margin: 20px auto;
            width: 60%;
            border-radius: 15px;
        }

        button {
            display: block;
            margin: 10px auto;
            padding: 12px;
            width: 60%;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        .good { background: #2ecc71; }
        .neutral { background: #f1c40f; }
        .bad { background: #e74c3c; }
    </style>
</head>

<body>

<h1>🌍 Climate Leadership Simulator</h1>

<div class="card">
    <h2 id="day"></h2>
    <p>🌡 Temp: <span id="temp"></span></p>
    <p>🏭 CO2: <span id="co2"></span></p>
    <p>💰 Economy: <span id="eco"></span></p>
    <p>🙂 Public: <span id="pub"></span></p>
</div>

<div class="card">
    <h2 id="scenario"></h2>

    <button class="good" onclick="makeChoice('good')" id="goodBtn"></button>
    <button class="neutral" onclick="makeChoice('neutral')" id="neutralBtn"></button>
    <button class="bad" onclick="makeChoice('bad')" id="badBtn"></button>
</div>

<script>

let gameState = {};

function startGame() {
    fetch("/start", {method: "POST"})
    .then(res => res.json())
    .then(data => {
        gameState = data;
        updateUI();
    });
}

function makeChoice(choice) {
    fetch("/choice", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({choice: choice})
    })
    .then(res => res.json())
    .then(data => {
        gameState = data;
        updateUI();
    });
}

function updateUI() {

    document.getElementById("day").innerText = "Day " + gameState.day;
    document.getElementById("temp").innerText = gameState.temperature.toFixed(2);
    document.getElementById("co2").innerText = gameState.co2_tons;
    document.getElementById("eco").innerText = gameState.economy;
    document.getElementById("pub").innerText = gameState.public;

    if (!gameState.current_scenario) {
        document.getElementById("scenario").innerText = "GAME OVER";
        return;
    }

    let s = gameState.current_scenario;

    document.getElementById("scenario").innerText = s.text;

    document.getElementById("goodBtn").innerText = s.good.text || "Good Policy";
    document.getElementById("neutralBtn").innerText = s.neutral.text || "Balanced Policy";
    document.getElementById("badBtn").innerText = s.bad.text || "Risky Policy";
}

// auto start
startGame();

</script>

</body>
</html>
