<!DOCTYPE html>
<html>
<head>
    <title>Game</title>
</head>
<body>

<h2>Day {{ state.day }}</h2>

<p><b>Economy:</b> {{ state.economy }}</p>
<p><b>Public Support:</b> {{ state.public }}</p>
<p><b>CO2:</b> {{ state.co2_tons }}</p>

<hr>

<h3>{{ scenario.title }}</h3>
<p>{{ scenario.text }}</p>

<form action="/decision/1">
    <button type="submit">{{ scenario.good.text }}</button>
</form>

<form action="/decision/2">
    <button type="submit">{{ scenario.neutral.text }}</button>
</form>

<form action="/decision/3">
    <button type="submit">{{ scenario.bad.text }}</button>
</form>

</body>
</html>
