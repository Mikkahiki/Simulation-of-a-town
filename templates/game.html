<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Climate Command Center</title>

<link rel="stylesheet" href="/static/style.css">
<script src="/static/game.js" defer></script>

</head>

<body>

<div class="topbar">
    🌍 Climate Command Center
</div>

<div class="layout">

<!-- LEFT: STATS -->
<div class="panel">

<h2>Live Stats</h2>

<p>Day: <span id="day"></span></p>
<p>Temperature: <span id="temp"></span></p>
<p>CO₂: <span id="co2"></span></p>
<p>Economy: <span id="eco"></span></p>
<p>Public: <span id="pub"></span></p>

</div>


<!-- RIGHT: GAME -->
<div class="panel main">

<h2 id="scenario-title"></h2>
<p id="scenario-text"></p>

<div class="choices">

<button onclick="makeDecision(1)" id="choice1"></button>
<button onclick="makeDecision(2)" id="choice2"></button>
<button onclick="makeDecision(3)" id="choice3"></button>

</div>

</div>

</div>

</body>
</html>
